name: Build-and-Deploy-Conduit

on:
    push:
        #branches: [ 'main' ]
        tags: ['v*.*.*']

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push-image:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        outputs:
            backend_tags: ${{ steps.meta-backend.outputs.tags }}
            frontend_tags: ${{ steps.meta-frontend.outputs.tags }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 0

            - name: Log in to the Container registry
              uses: docker/login-action@v3.4.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Backend image
            - name: Extract metadata (tags) for backend
              id: meta-backend
              uses: docker/metadata-action@v3.4.0
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/conduit-backend
                  tags: |
                      type=ref,event=tag
                  flavor: |
                      latest=false

            - name: Build and push backend image
              id: push-backend
              uses: docker/build-push-action@v6.18.0
              with:
                  context: ./conduit-backend
                  file: ./conduit-backend/Dockerfile
                  push: true
                  tags: ${{ steps.meta-backend.outputs.tags }}

            # Frontend image
            - name: Extract metadata (tags) for frontend
              id: meta-frontend
              uses: docker/metadata-action@v3.4.0
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/conduit-frontend
                  tags: |
                      type=ref,event=tag
                  flavor: |
                      latest=false

            - name: Build and push frontend image
              id: push-frontend
              uses: docker/build-push-action@v6.18.0
              with:
                  context: ./conduit-frontend
                  file: ./conduit-frontend/Dockerfile
                  push: true
                  tags: ${{ steps.meta-frontend.outputs.tags }}

    deploy:
        name: Deploy to VM via SSH
        runs-on: ubuntu-latest
        needs: build-and-push-image

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Prepare docker compose file
              run: |
                  export BACKEND_IMAGE="${{ needs.build-and-push-image.outputs.backend_tags }}"
                  export FRONTEND_IMAGE="${{ needs.build-and-push-image.outputs.frontend_tags }}"
                  export API_URL="${{ secrets.API_URL }}"
                  envsubst < docker-compose.yaml > docker-compose.yml

            - name: Copy docker compose to VM via SSH
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  source: docker-compose.yml
                  # change to your target directory to your environment
                  target: '$HOME/repos/${{ github.repository.name }}'

            - name: Run rocker compose file
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  # change to your target directory to your environment
                  script: |
                      set -e
                      echo "${{ secrets.GITHUB_TOKEN }}" \
                        | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
                      cd "$HOME/repos/${{ github.repository.name }}"
                      docker compose pull
                      docker compose down
                      docker compose up -d

                      echo "Deployment completed successfully!"
